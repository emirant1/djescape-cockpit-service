version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: djescape-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: escape
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - djescape-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  djescape-cockpit-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: djescape-cockpit-service:1.0.0
    container_name: djescape-cockpit-service
    environment:
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: escape
      NODE_ENV: production
      REFRESH_SECRET: <set_me>
      JWT_SECRET: <set_me>
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - djescape-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  djescape-network:
    driver: bridge
